# Test profile — used by @SpringBootTest with @ActiveProfiles("test")
# Uses in-memory H2 so tests don't need PostgreSQL
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# JWT for tests (fixed values)
app.jwt.access-secret=test-access-secret-at-least-32-characters-long
app.jwt.access-expiry=15m
app.jwt.refresh-secret=test-refresh-secret-at-least-32-characters
app.jwt.refresh-expiry=7d
app.cors.allowed-origin=http://localhost:3000
