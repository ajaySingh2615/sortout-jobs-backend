spring.application.name=sortout-job-backend
#Database configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/sortout_jobs_db
spring.datasource.username=sortout
spring.datasource.password=password
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT Configuration
jwt.secret=your-super-secret-key-should-be-at-least-256-bits-long-for-security
jwt.expiration=86400000

# Refresh Token (7 days in milliseconds)
jwt.refresh-expiration=604800000