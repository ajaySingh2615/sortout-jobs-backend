# Base config — values can be overridden by profile (application-{profile}.properties)
# Secrets and URLs should come from environment variables (see .env.example)
spring.application.name=sortout-jobs-backend

# Server
server.port=${SERVER_PORT:8080}

# Database (set via env or .env)
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate (overridden per profile)
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# JWT (set via env or .env)
app.jwt.access-secret=${JWT_ACCESS_SECRET}
app.jwt.access-expiry=${JWT_ACCESS_EXPIRY:15m}
app.jwt.refresh-secret=${JWT_REFRESH_SECRET}
app.jwt.refresh-expiry=${JWT_REFRESH_EXPIRY:7d}

# CORS (optional, for frontend)
app.cors.allowed-origin=${CORS_ORIGIN:http://localhost:3000}
